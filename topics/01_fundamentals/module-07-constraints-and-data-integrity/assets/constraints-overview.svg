<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Constraint dasar PostgreSQL</title>
  <desc id="desc">Diagram ringkas yang menunjukkan jenis constraint dasar PostgreSQL dan fungsi utamanya untuk menjaga integritas data.</desc>
  <style>
    .bg { fill: #f6f2e9; }
    .header { fill: #18324b; }
    .center { fill: #fff4d6; stroke: #c38f31; stroke-width: 2.5; }
    .cardA { fill: #eef4fb; stroke: #56718a; stroke-width: 2; }
    .cardB { fill: #e8f4ea; stroke: #427a59; stroke-width: 2; }
    .cardC { fill: #fcefe6; stroke: #b96f3b; stroke-width: 2; }
    .title { fill: #ffffff; font-family: Segoe UI, Arial, sans-serif; font-size: 24px; font-weight: 700; }
    .head { fill: #1c2833; font-family: Segoe UI, Arial, sans-serif; font-size: 19px; font-weight: 700; }
    .body { fill: #1c2833; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; }
    .small { fill: #536273; font-family: Segoe UI, Arial, sans-serif; font-size: 14px; }
    .line { stroke: #8b6a2b; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b6a2b"/>
    </marker>
  </defs>

  <rect class="bg" width="960" height="560" rx="20"/>
  <rect class="header" x="40" y="30" width="880" height="80" rx="18"/>
  <text class="title" x="70" y="78">Constraint Dasar PostgreSQL</text>
  <text class="small" x="70" y="100" fill="#d7e3ee">Setiap constraint menjaga kualitas data dari sisi yang berbeda</text>

  <rect class="center" x="345" y="210" width="270" height="120" rx="20"/>
  <text class="head" x="405" y="255">Data Integrity</text>
  <text class="body" x="385" y="286">Data tetap valid, konsisten,</text>
  <text class="body" x="406" y="309">dan tidak sembarang masuk</text>

  <rect class="cardA" x="70" y="130" width="200" height="100" rx="18"/>
  <text class="head" x="105" y="170">NOT NULL</text>
  <text class="small" x="94" y="198">Nilai wajib ada</text>

  <rect class="cardB" x="70" y="350" width="200" height="100" rx="18"/>
  <text class="head" x="122" y="390">UNIQUE</text>
  <text class="small" x="90" y="418">Nilai tidak duplikat</text>

  <rect class="cardC" x="380" y="380" width="200" height="100" rx="18"/>
  <text class="head" x="405" y="420">PRIMARY KEY</text>
  <text class="small" x="417" y="448">Identitas utama row</text>

  <rect class="cardB" x="690" y="130" width="200" height="100" rx="18"/>
  <text class="head" x="718" y="170">FOREIGN KEY</text>
  <text class="small" x="720" y="198">Menjaga relasi valid</text>

  <rect class="cardA" x="690" y="350" width="200" height="100" rx="18"/>
  <text class="head" x="757" y="390">CHECK</text>
  <text class="small" x="712" y="418">Menegakkan aturan logis</text>

  <path class="line" d="M270 180 C310 180, 310 220, 345 245"/>
  <path class="line" d="M270 400 C310 400, 310 340, 345 295"/>
  <path class="line" d="M580 420 C560 390, 560 350, 560 330"/>
  <path class="line" d="M690 180 C650 180, 650 220, 615 245"/>
  <path class="line" d="M690 400 C650 400, 650 340, 615 295"/>
</svg>
