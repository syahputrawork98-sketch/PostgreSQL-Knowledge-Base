<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Gambaran dasar PostgreSQL</title>
  <desc id="desc">Diagram sederhana yang menunjukkan hubungan PostgreSQL server, database, schema, table, column, dan row.</desc>
  <style>
    .bg { fill: #f7f4ea; }
    .server { fill: #17324d; stroke: #17324d; stroke-width: 2; }
    .database { fill: #fff8e6; stroke: #c78b2a; stroke-width: 2; }
    .schema { fill: #e9f4ee; stroke: #2f7d5d; stroke-width: 2; }
    .table { fill: #ffffff; stroke: #4f6d8a; stroke-width: 2; }
    .row { fill: #f2f7fb; }
    .text-light { fill: #ffffff; font-family: Segoe UI, Arial, sans-serif; font-size: 24px; font-weight: 700; }
    .text-dark { fill: #1d2733; font-family: Segoe UI, Arial, sans-serif; font-size: 20px; font-weight: 700; }
    .text-body { fill: #1d2733; font-family: Segoe UI, Arial, sans-serif; font-size: 16px; }
    .text-small { fill: #425466; font-family: Segoe UI, Arial, sans-serif; font-size: 14px; }
    .label { fill: #8b5e1a; font-family: Segoe UI, Arial, sans-serif; font-size: 14px; font-weight: 700; }
    .arrow { stroke: #8a6d3b; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8a6d3b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="960" height="540" rx="20"/>

  <rect class="server" x="50" y="40" width="860" height="460" rx="24"/>
  <text class="text-light" x="80" y="82">PostgreSQL Server</text>
  <text class="text-small" x="80" y="110" fill="#d8e4ef">Sistem utama yang menampung banyak database</text>

  <rect class="database" x="90" y="140" width="330" height="300" rx="20"/>
  <text class="text-dark" x="120" y="182">Database</text>
  <text class="label" x="120" y="208">Contoh: school_db</text>
  <text class="text-body" x="120" y="240">Wadah logis utama untuk object</text>
  <text class="text-body" x="120" y="265">seperti schema, table, view,</text>
  <text class="text-body" x="120" y="290">function, dan object lain.</text>

  <rect class="schema" x="470" y="140" width="210" height="140" rx="18"/>
  <text class="text-dark" x="500" y="182">Schema</text>
  <text class="label" x="500" y="208">Contoh: public</text>
  <text class="text-body" x="500" y="240">Ruang pengelompokan object</text>
  <text class="text-body" x="500" y="265">di dalam database.</text>

  <rect class="table" x="720" y="140" width="150" height="260" rx="18"/>
  <text class="text-dark" x="750" y="182">Table</text>
  <text class="label" x="750" y="208">students</text>
  <line x1="740" y1="225" x2="850" y2="225" stroke="#4f6d8a" stroke-width="1.5"/>

  <rect class="row" x="735" y="238" width="120" height="42" rx="8"/>
  <text class="text-body" x="748" y="263">student_id</text>
  <rect class="row" x="735" y="287" width="120" height="42" rx="8"/>
  <text class="text-body" x="748" y="312">full_name</text>
  <rect class="row" x="735" y="336" width="120" height="42" rx="8"/>
  <text class="text-body" x="748" y="361">birth_date</text>

  <text class="text-small" x="728" y="430">Column menentukan struktur</text>
  <text class="text-small" x="728" y="450">Row berisi data aktual</text>

  <rect class="row" x="470" y="320" width="210" height="90" rx="18"/>
  <text class="text-dark" x="500" y="352">Row</text>
  <text class="text-body" x="500" y="382">1 | Alya Putri | 2005-02-14</text>

  <path class="arrow" d="M420 230 C445 230, 445 210, 470 210"/>
  <path class="arrow" d="M680 210 C700 210, 700 210, 720 210"/>
  <path class="arrow" d="M795 380 C795 395, 650 395, 680 365"/>

  <text class="text-small" x="433" y="196">berisi</text>
  <text class="text-small" x="690" y="196">berisi</text>
  <text class="text-small" x="684" y="418">data per baris</text>
</svg>
