<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Ringkasan tipe data dasar PostgreSQL</title>
  <desc id="desc">Diagram berbentuk kartu ringkas yang membandingkan tipe data dasar PostgreSQL untuk pemula.</desc>
  <style>
    .bg { fill: #f7f3ea; }
    .header { fill: #16324a; }
    .card1 { fill: #fff7df; stroke: #c59233; stroke-width: 2; }
    .card2 { fill: #eaf4ec; stroke: #417a59; stroke-width: 2; }
    .card3 { fill: #eef4fb; stroke: #55708a; stroke-width: 2; }
    .card4 { fill: #fcefe6; stroke: #ba6f3b; stroke-width: 2; }
    .title { fill: #ffffff; font-family: Segoe UI, Arial, sans-serif; font-size: 24px; font-weight: 700; }
    .head { fill: #1c2833; font-family: Segoe UI, Arial, sans-serif; font-size: 19px; font-weight: 700; }
    .body { fill: #1c2833; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; }
    .small { fill: #536273; font-family: Segoe UI, Arial, sans-serif; font-size: 14px; }
  </style>

  <rect class="bg" width="960" height="560" rx="20"/>
  <rect class="header" x="40" y="30" width="880" height="80" rx="18"/>
  <text class="title" x="70" y="78">Tipe Data Dasar PostgreSQL</text>
  <text class="small" x="70" y="100" fill="#d7e3ee">Ringkasan cepat untuk memilih tipe data inti pada tahap fundamentals</text>

  <rect class="card1" x="60" y="140" width="260" height="150" rx="18"/>
  <text class="head" x="85" y="180">INTEGER</text>
  <text class="body" x="85" y="210">Untuk angka bulat</text>
  <text class="small" x="85" y="238">Contoh: quantity, age</text>
  <text class="small" x="85" y="262">Nilai: 1, 25, 1000</text>

  <rect class="card2" x="350" y="140" width="260" height="150" rx="18"/>
  <text class="head" x="375" y="180">NUMERIC</text>
  <text class="body" x="375" y="210">Untuk angka desimal presisi</text>
  <text class="small" x="375" y="238">Contoh: price, total_amount</text>
  <text class="small" x="375" y="262">Nilai: 99.50, 12.75</text>

  <rect class="card3" x="640" y="140" width="260" height="150" rx="18"/>
  <text class="head" x="665" y="180">TEXT</text>
  <text class="body" x="665" y="210">Untuk teks bebas</text>
  <text class="small" x="665" y="238">Contoh: full_name, address</text>
  <text class="small" x="665" y="262">Nilai: 'Alya Putri'</text>

  <rect class="card2" x="60" y="330" width="260" height="150" rx="18"/>
  <text class="head" x="85" y="370">BOOLEAN</text>
  <text class="body" x="85" y="400">Untuk status true/false</text>
  <text class="small" x="85" y="428">Contoh: is_active</text>
  <text class="small" x="85" y="452">Nilai: true, false</text>

  <rect class="card4" x="350" y="330" width="260" height="150" rx="18"/>
  <text class="head" x="375" y="370">DATE</text>
  <text class="body" x="375" y="400">Untuk tanggal tanpa jam</text>
  <text class="small" x="375" y="428">Contoh: birth_date</text>
  <text class="small" x="375" y="452">Nilai: 2026-03-12</text>

  <rect class="card3" x="640" y="330" width="260" height="150" rx="18"/>
  <text class="head" x="665" y="370">TIMESTAMP</text>
  <text class="body" x="665" y="400">Untuk tanggal dan waktu</text>
  <text class="small" x="665" y="428">Contoh: created_at</text>
  <text class="small" x="665" y="452">Nilai: 2026-03-12 09:30:00</text>
</svg>
