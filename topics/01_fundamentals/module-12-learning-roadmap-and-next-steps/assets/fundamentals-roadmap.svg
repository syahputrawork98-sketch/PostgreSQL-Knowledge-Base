<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">Roadmap setelah fundamentals PostgreSQL</title>
  <desc id="desc">Diagram roadmap yang menunjukkan fundamentals sebagai fondasi lalu berlanjut ke queries, indexing, transactions, dan topik teknis lain.</desc>
  <style>
    .bg { fill: #f7f2e9; }
    .header { fill: #17324b; }
    .foundation { fill: #fff3d8; stroke: #c49033; stroke-width: 2.5; }
    .stepA { fill: #e9f4ec; stroke: #427a59; stroke-width: 2; }
    .stepB { fill: #eef4fb; stroke: #58728b; stroke-width: 2; }
    .stepC { fill: #fcefe6; stroke: #b96f3b; stroke-width: 2; }
    .title { fill: #ffffff; font-family: Segoe UI, Arial, sans-serif; font-size: 24px; font-weight: 700; }
    .head { fill: #1c2833; font-family: Segoe UI, Arial, sans-serif; font-size: 19px; font-weight: 700; }
    .body { fill: #1c2833; font-family: Segoe UI, Arial, sans-serif; font-size: 15px; }
    .small { fill: #536273; font-family: Segoe UI, Arial, sans-serif; font-size: 14px; }
    .line { stroke: #8b6a2b; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b6a2b"/>
    </marker>
  </defs>

  <rect class="bg" width="980" height="560" rx="20"/>
  <rect class="header" x="40" y="30" width="900" height="80" rx="18"/>
  <text class="title" x="70" y="78">Roadmap Setelah 01 Fundamentals</text>
  <text class="small" x="70" y="100" fill="#d7e3ee">Dari fondasi dasar ke jalur belajar PostgreSQL berikutnya</text>

  <rect class="foundation" x="80" y="180" width="250" height="160" rx="20"/>
  <text class="head" x="120" y="220">01 Fundamentals</text>
  <text class="body" x="120" y="252">Object dasar</text>
  <text class="body" x="120" y="276">Tipe data</text>
  <text class="body" x="120" y="300">Constraint</text>
  <text class="body" x="120" y="324">CRUD dan query dasar</text>

  <rect class="stepA" x="390" y="110" width="220" height="120" rx="18"/>
  <text class="head" x="442" y="150">02 Queries</text>
  <text class="body" x="430" y="182">JOIN, GROUP BY,</text>
  <text class="body" x="430" y="205">subquery, CTE</text>

  <rect class="stepB" x="390" y="260" width="220" height="120" rx="18"/>
  <text class="head" x="435" y="300">03 Indexing</text>
  <text class="body" x="420" y="332">Mulai paham query</text>
  <text class="body" x="420" y="355">dan performa baca</text>

  <rect class="stepC" x="390" y="410" width="220" height="120" rx="18"/>
  <text class="head" x="420" y="450">05 Transactions</text>
  <text class="body" x="420" y="482">Konsistensi perubahan</text>
  <text class="body" x="420" y="505">data dan alur aman</text>

  <rect class="stepB" x="680" y="185" width="220" height="150" rx="18"/>
  <text class="head" x="727" y="225">Topik Lain</text>
  <text class="body" x="710" y="257">Security</text>
  <text class="body" x="710" y="281">Administration</text>
  <text class="body" x="710" y="305">Performance</text>

  <path class="line" d="M330 240 C360 240, 360 170, 390 170"/>
  <path class="line" d="M330 260 C360 260, 360 320, 390 320"/>
  <path class="line" d="M330 280 C360 280, 360 470, 390 470"/>
  <path class="line" d="M610 230 C645 230, 645 230, 680 230"/>
  <path class="line" d="M610 320 C645 320, 645 270, 680 270"/>
  <path class="line" d="M610 470 C645 470, 645 305, 680 305"/>

  <text class="small" x="86" y="372">Fundamentals tidak harus sempurna total,</text>
  <text class="small" x="86" y="394">tetapi harus cukup kuat untuk lanjut dengan nyaman.</text>
</svg>
