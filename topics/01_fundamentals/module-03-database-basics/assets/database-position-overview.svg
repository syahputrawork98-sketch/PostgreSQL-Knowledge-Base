<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Posisi database dalam PostgreSQL</title>
  <desc id="desc">Diagram sederhana yang menunjukkan PostgreSQL server berisi beberapa database, lalu database berisi schema dan table.</desc>
  <style>
    .bg { fill: #f5f1e8; }
    .server { fill: #1d3557; }
    .box { fill: #fffdf7; stroke: #c08a2f; stroke-width: 2; }
    .db-main { fill: #fff1cc; stroke: #c08a2f; stroke-width: 3; }
    .schema { fill: #e6f4ea; stroke: #3c7a57; stroke-width: 2; }
    .table { fill: #eef4fb; stroke: #4b6b8a; stroke-width: 2; }
    .title { fill: #ffffff; font-family: Segoe UI, Arial, sans-serif; font-size: 24px; font-weight: 700; }
    .head { fill: #1a2733; font-family: Segoe UI, Arial, sans-serif; font-size: 20px; font-weight: 700; }
    .body { fill: #1a2733; font-family: Segoe UI, Arial, sans-serif; font-size: 16px; }
    .small { fill: #4d5f73; font-family: Segoe UI, Arial, sans-serif; font-size: 14px; }
    .line { stroke: #8b6a2b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b6a2b"/>
    </marker>
  </defs>

  <rect class="bg" width="960" height="540" rx="20"/>
  <rect class="server" x="50" y="40" width="860" height="460" rx="24"/>
  <text class="title" x="80" y="82">PostgreSQL Server</text>
  <text class="small" x="80" y="110" fill="#d5e0eb">Satu server dapat menampung banyak database</text>

  <rect class="box" x="100" y="150" width="170" height="110" rx="18"/>
  <text class="head" x="130" y="190">Database</text>
  <text class="body" x="130" y="220">postgres</text>

  <rect class="db-main" x="315" y="130" width="320" height="280" rx="22"/>
  <text class="head" x="345" y="175">Database Aktif</text>
  <text class="body" x="345" y="205">learning_db</text>
  <text class="small" x="345" y="235">Konteks kerja saat kita terhubung</text>

  <rect class="schema" x="350" y="270" width="110" height="80" rx="16"/>
  <text class="head" x="370" y="315">public</text>

  <rect class="table" x="490" y="270" width="110" height="80" rx="16"/>
  <text class="head" x="520" y="315">students</text>

  <rect class="box" x="680" y="150" width="170" height="110" rx="18"/>
  <text class="head" x="710" y="190">Database</text>
  <text class="body" x="710" y="220">inventory_db</text>

  <path class="line" d="M270 205 C290 205, 290 205, 315 205"/>
  <path class="line" d="M635 205 C655 205, 655 205, 680 205"/>
  <path class="line" d="M475 240 C475 250, 405 250, 405 270"/>
  <path class="line" d="M475 240 C475 250, 545 250, 545 270"/>

  <text class="small" x="375" y="380">Schema dan table hidup di dalam database</text>
  <text class="small" x="325" y="435">Kita selalu bekerja dari konteks satu database tertentu,</text>
  <text class="small" x="330" y="455">bukan ke semua database sekaligus.</text>
</svg>
